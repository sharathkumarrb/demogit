<!DOCTYPE html>
<html>
    <head>
        <title>Event Handling</title>
    </head>
    <body>
        <button id="btn">Click Me</button>
        <script> 
            let element = document.getElementById("btn");

                element.addEventListener("click", function(){
                    alert("Button Clicked!");
                });
            </script>
        </body>
    </head>
</html>
